version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./documents.db:/app/documents.db
    environment:
      - DATABASE_URL=sqlite:///./documents.db
      - PYTHONUNBUFFERED=1
    networks:
      - doc-intelligence

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=docuser
      - POSTGRES_PASSWORD=secure_password
      - POSTGRES_DB=doc_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - doc-intelligence

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - doc-intelligence

networks:
  doc-intelligence:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
